{% extends 'base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block page_title %}Apply for Leave{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('leaves.index') }}">Leave</a> / Apply{% endblock %}
{% block content %}
<div class="card" style="max-width:560px">
<div class="card-header"><div class="card-title">Leave Application Form</div></div>
<div class="card-body">
<form method="post">
  <div class="form-group"><label class="form-label">Employee *</label>
    <select name="employee_id" class="form-control" required>
      <option value="">Select Employee</option>
      {% for e in employees %}<option value="{{ e.id }}">{{ e.last_name }}, {{ e.first_name }} ({{ e.employee_no }})</option>{% endfor %}
    </select>
  </div>
  <div class="form-group"><label class="form-label">Leave Type *</label>
    <select name="leave_type" class="form-control" required>
      <option value="VL">Vacation Leave (VL)</option>
      <option value="SL">Sick Leave (SL)</option>
      <option value="EL">Emergency Leave (EL)</option>
      <option value="ML">Maternity Leave (ML)</option>
      <option value="PL">Paternity Leave (PL)</option>
      <option value="SPL">Solo Parent Leave (SPL)</option>
    </select>
  </div>
  <div class="form-row cols-2">
    <div class="form-group"><label class="form-label">From Date *</label><input type="date" name="date_from" class="form-control" required></div>
    <div class="form-group"><label class="form-label">To Date *</label><input type="date" name="date_to" class="form-control" required></div>
  </div>
  <div class="form-group"><label class="form-label">Reason</label><textarea name="reason" class="form-control" rows="3" placeholder="State reason for leave..."></textarea></div>
  <div class="d-flex gap-8 justify-between">
    <a href="{{ url_for('leaves.index') }}" class="btn">Cancel</a>
    <button type="submit" class="btn btn-primary"><i class="ti ti-send"></i> Submit Request</button>
  </div>
</form>
</div></div>
{% endblock %}
