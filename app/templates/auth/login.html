<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — ERP System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);z-index:0}
.login-wrap{position:relative;z-index:1;width:420px;max-width:95vw}
.login-logo{text-align:center;margin-bottom:32px}
.logo-box{width:56px;height:56px;background:#1a56db;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 32px rgba(26,86,219,.4)}
.logo-box i{font-size:28px;color:#fff}
.logo-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:12px;color:#64748b;margin-top:2px}
.login-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:32px;backdrop-filter:blur(10px)}
.login-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:#94a3b8;margin-bottom:24px}
.form-label{display:block;font-size:12px;font-weight:500;color:#94a3b8;margin-bottom:6px}
.form-control{width:100%;padding:11px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:14px;color:#fff;outline:none;transition:border-color .15s}
.form-control::placeholder{color:#475569}
.form-control:focus{border-color:#3b82f6;background:rgba(255,255,255,.1)}
.form-group{margin-bottom:16px}
.btn-login{width:100%;padding:12px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:8px}
.btn-login:hover{background:#1e429f}
.alert-error{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:#475569}
.input-icon{position:relative}
.input-icon i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#475569;font-size:16px}
.input-icon .form-control{padding-left:38px}
</style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-box"><i class="ti ti-building-factory-2"></i></div>
    <div class="logo-name">ERP SYSTEM</div>
    <div class="logo-sub">Philippine Payroll & HR Management</div>
  </div>
  <div class="login-card">
    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to your ERP account</div>
    {% if error %}
    <div class="alert-error"><i class="ti ti-alert-circle"></i> {{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-icon">
          <i class="ti ti-user"></i>
          <input class="form-control" type="text" name="username" placeholder="Enter username" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-icon">
          <i class="ti ti-lock"></i>
          <input class="form-control" type="password" name="password" placeholder="Enter password" required>
        </div>
      </div>
      <button class="btn-login" type="submit"><i class="ti ti-login" style="vertical-align:-2px"></i> Sign In</button>
    </form>
  </div>
  <div class="login-footer">Default: admin / admin123 — Change in Settings after first login</div>
</div>
</body>
</html>
