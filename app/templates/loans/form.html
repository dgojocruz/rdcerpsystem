{% extends 'base.html' %}
{% block title %}Add Loan{% endblock %}
{% block page_title %}Add Employee Loan{% endblock %}
{% block breadcrumb %}<a href="{{ url_for('loans.index') }}">Loans</a> / Add{% endblock %}
{% block content %}
<div class="card" style="max-width:620px">
<div class="card-header"><div class="card-title">New Loan Record</div></div>
<div class="card-body">
<form method="post">
  <div class="form-group">
    <label class="form-label">Employee *</label>
    <select name="employee_id" class="form-control" required>
      <option value="">Select Employee</option>
      {% for e in employees %}<option value="{{ e.id }}">{{ e.last_name }}, {{ e.first_name }} ({{ e.employee_no }})</option>{% endfor %}
    </select>
  </div>
  <div class="form-row cols-2">
    <div class="form-group">
      <label class="form-label">Loan Category *</label>
      <select name="loan_category" class="form-control" required onchange="updateTypes(this.value)">
        {% for cat in categories.keys() %}<option value="{{ cat }}">{{ cat }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Loan Type *</label>
      <select name="loan_type" id="loanType" class="form-control" required>
        {% for t in categories['SSS'] %}<option>{{ t }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div class="form-row cols-2">
    <div class="form-group"><label class="form-label">Principal Amount (₱) *</label><input name="principal_amount" type="number" step="0.01" class="form-control" required></div>
    <div class="form-group"><label class="form-label">Monthly Amortization (₱) *</label><input name="monthly_amortization" type="number" step="0.01" class="form-control" required></div>
  </div>
  <div class="form-row cols-2">
    <div class="form-group"><label class="form-label">Start Date</label><input name="start_date" type="date" class="form-control"></div>
    <div class="form-group"><label class="form-label">End Date</label><input name="end_date" type="date" class="form-control"></div>
  </div>
  <div class="form-group"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
  <div class="d-flex justify-between">
    <a href="{{ url_for('loans.index') }}" class="btn">Cancel</a>
    <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Save Loan</button>
  </div>
</form>
</div></div>
{% endblock %}
{% block extra_js %}
<script>
const cats = {{ categories|tojson }};
function updateTypes(cat) {
  const sel = document.getElementById('loanType');
  sel.innerHTML = (cats[cat]||[]).map(t=>`<option>${t}</option>`).join('');
}
</script>
{% endblock %}
